<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDR APP</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <h2>Assistent Virtual TDR_1</h2>
    <div class="input-box">
        <input type="text" id="miInput" name="Question" placeholder="Escriu aquí per preguntar">
    </div>
    <div id="miOutput" class="output-box"></div>

    <button type="button" id="btnEnviar" class="btn"></button>

    <button type="button" id="btnGrabar" class="btn-grabar">🎤 Gravar</button>
    
    <audio id="audioPlayer" style="display: none;"></audio>

    <script>

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    document.getElementById('btnGrabar').addEventListener('click', async function() {
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,    
                        noiseSuppression: true,    
                        autoGainControl: true     
                    } 
                });
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'audio/webm;codecs=opus'
                });
                audioChunks = [];
                
                mediaRecorder.ondataavailable = function(event) {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = function(async) {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    
                    const formData = new FormData();
                    formData.append('audio', audioBlob, 'audio.webm');
                    
                    document.getElementById('miOutput').innerText = "Transcrivint...";
                    
                    fetch('http://127.0.0.1:5000/transcriure', {
                        method: 'POST',
                        body: formData
                    })
                    .then(function(response) { return response.json(); })
                    .then(function(data) { 
                        if (data.error) {
                            document.getElementById('miOutput').innerText = "Error: " + data.error;
                        } else {
                            document.getElementById('miInput').value = data.transcription;
                            
                            document.getElementById('miOutput').innerText = "Generant resposta...";
                            
                            fetch('http://127.0.0.1:5000/missatge', {
                                method: 'POST',
                                headers: { 
                                    'Content-Type': 'application/json',
                                    'Accept': 'application/json'
                                },
                                body: JSON.stringify({ message: data.transcription })
                            })
                            .then(function(response) { return response.json(); })
                            .then(function(gptData) {
                                
                                document.getElementById('miOutput').innerText = gptData.message;
                                
                                
                                if (gptData.audio) {
                                    const audioPlayer = document.getElementById('audioPlayer');
                                    const binaryString = atob(gptData.audio);
                                    const bytes = new Uint8Array(binaryString.length);
                                    for (let x = 0; x < binaryString.length; x++) {
                                        bytes[x] = binaryString.charCodeAt(x);
                                    }
                                    const audioBlob = new Blob([bytes], { type: 'audio/mp3' });
                                    const audioUrl = URL.createObjectURL(audioBlob);
                                    audioPlayer.src = audioUrl;
                                    audioPlayer.play().catch(function(e) {
                                        console.error("Error al reproducir audio:", e);
                                    });
                                }
                            })
                            .catch(function(error) {
                                console.error("Error al enviar a GPT:", error);
                                document.getElementById('miOutput').innerText = "Error al obtenir resposta de l'assistent.";
                            });
                        }
                    })
                    .catch(function(error)  {
                        console.error("Error en transcriure:", error);
                        document.getElementById('miOutput').innerText = "Error en transcriure l'audio.";
                    });
                };
                
                mediaRecorder.start();
                isRecording = true;
                document.getElementById('btnGrabar').innerText = '⏹️ Parar';
                document.getElementById('btnGrabar').style.backgroundColor = 'rgb(255, 100, 100)';
            } catch (error) {
                console.error("Error en accedir al micròfon:", error);
                document.getElementById('miOutput').innerText = "Permisos de micròfon denegats. Revisa la barra del navegador.";
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            document.getElementById('btnGrabar').innerText = '🎤 Gravar';
            document.getElementById('btnGrabar').style.backgroundColor = 'rgb(80, 170, 223)';
            mediaRecorder.stream.getTracks().forEach(function(track) { track.stop(); });
        }
    });

    document.getElementById('btnEnviar').addEventListener('click', function(event) {
        event.preventDefault();
        const message = document.getElementById('miInput').value;

        if (!message.trim()) return;
        fetch('http://127.0.0.1:5000/missatge', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({ message: message })
        })
        .then(function(response) {
            if (!response.ok) {
                throw new Error('Error en la respuesta del servidor');
            }
            return response.json(); 
        })
        .then(function(data) {
            document.getElementById('miOutput').innerText = data.message;
            
            if (data.audio) {
                const audioPlayer = document.getElementById('audioPlayer');
                

                const binaryString = atob(data.audio);
                const bytes = new Uint8Array(binaryString.length);
                for (let x = 0; x < binaryString.length; x++) {
                    bytes[x] = binaryString.charCodeAt(x);
                }
                const audioBlob = new Blob([bytes], { type: 'audio/mp3' });
                const audioUrl = URL.createObjectURL(audioBlob); 
                 
                audioPlayer.src = audioUrl;
                audioPlayer.play().catch(function(e) {
                    console.error("Error al reproducir audio:", e);
                });
                
                document.getElementById('miInput').value = '';
            }
        })
        .catch(function(error) {
            console.error("Error en fetch:", error);
            document.getElementById('miOutput').innerText = "Error a l'obtenir resposta.";
        });
    });

    document.getElementById('miInput').addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            document.getElementById('btnEnviar').click();
        }
    });
    </script>
</body>
</html>
